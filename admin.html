<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מקרא הוצאה לאור | כניסה למערכת</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #0f3d47 0%, #1a6b7a 50%, #0f3d47 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1a6b7a;
            display: block;
        }

        .login-logo-sub {
            font-size: 0.8rem;
            color: #c8913a;
            letter-spacing: 2px;
            display: block;
            margin-top: 0.1rem;
        }

        .login-title {
            font-size: 1.1rem;
            color: #555;
            margin-top: 1rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Heebo', sans-serif;
            color: #333;
            transition: border-color 0.2s;
            background: #fafafa;
            direction: ltr;
            text-align: right;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a6b7a;
            background: #fff;
        }

        .form-group input.error-field {
            border-color: #e53935;
        }

        .error-msg {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 8px;
            color: #c62828;
            font-size: 0.88rem;
            padding: 0.65rem 1rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: #1a6b7a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn-login:hover { background: #155a68; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { background: #aaa; cursor: not-allowed; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            color: #888;
            font-size: 0.88rem;
            text-decoration: none;
        }

        .back-link:hover { color: #1a6b7a; }

        /* Admin dashboard (hidden until logged in) */
        #adminDashboard {
            display: none;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
        }

        .dashboard-header {
            background: #1a6b7a;
            color: #fff;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dashboard-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .dashboard-header .admin-email {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .btn-logout {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            transition: background 0.2s;
        }

        .btn-logout:hover { background: rgba(255,255,255,0.25); }

        .dashboard-body {
            padding: 2rem;
        }

        .dashboard-body h2 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: #f5f9fa;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            border: 1px solid #e0eff2;
        }

        .stat-box .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: #1a6b7a;
        }

        .stat-box .stat-lbl {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .dashboard-note {
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- Login Form -->
<div class="login-card" id="loginCard">
    <div class="login-header">
        <span class="login-logo">מקרא</span>
        <span class="login-logo-sub">הוצאה לאור</span>
        <p class="login-title">כניסה למערכת הניהול</p>
    </div>

    <div class="error-msg" id="errorMsg">כתובת המייל או הסיסמה שגויים. נסה שנית.</div>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="email">כתובת מייל</label>
            <input type="email" id="email" name="email" placeholder="admin@mikrabooks.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">סיסמה</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">כניסה למערכת</button>
    </form>

    <a href="index.html" class="back-link">חזרה לאתר</a>
</div>

<!-- Admin Dashboard (shown after login) -->
<div id="adminDashboard">
    <div class="dashboard-header">
        <h1>לוח הניהול – מקרא הוצאה לאור</h1>
        <div>
            <span class="admin-email" id="loggedInEmail"></span>
            <button class="btn-logout" id="logoutBtn">יציאה</button>
        </div>
    </div>
    <div class="dashboard-body">
        <h2>סיכום</h2>
        <div class="dashboard-stats">
            <div class="stat-box">
                <div class="stat-num">230+</div>
                <div class="stat-lbl">ספרים שיצאו לאור</div>
            </div>
            <div class="stat-box">
                <div class="stat-num">10</div>
                <div class="stat-lbl">שנות פעילות</div>
            </div>
            <div class="stat-box">
                <div class="stat-num">מאות</div>
                <div class="stat-lbl">מחברים</div>
            </div>
        </div>
        <div class="dashboard-note">ברוך הבא! מערכת הניהול בפיתוח.</div>
    </div>
</div>

<script>
(function () {
    'use strict';

    // Credentials — change before production deployment
    // Password stored as SHA-256 hex of the actual password
    // Current password: Admin@Mikra2026  →  hash below
    const VALID_EMAIL = 'admin@mikrabooks.com';
    const VALID_HASH  = 'bf9b20d9f31f1247425a92704c4e101bbae5f2d4d4bed95b10b8a6ddae320635';

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const SESSION_KEY = 'mkr_admin_session';

    function showDashboard(email) {
        document.getElementById('loginCard').style.display = 'none';
        const dash = document.getElementById('adminDashboard');
        dash.style.display = 'block';
        document.getElementById('loggedInEmail').textContent = email;
    }

    function showLogin() {
        document.getElementById('loginCard').style.display = 'block';
        document.getElementById('adminDashboard').style.display = 'none';
    }

    // Check existing session
    const session = sessionStorage.getItem(SESSION_KEY);
    if (session) {
        try {
            const data = JSON.parse(session);
            if (data && data.email) {
                showDashboard(data.email);
            }
        } catch (_) {
            sessionStorage.removeItem(SESSION_KEY);
        }
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function () {
        sessionStorage.removeItem(SESSION_KEY);
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('errorMsg').classList.remove('visible');
        showLogin();
    });

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const emailEl    = document.getElementById('email');
        const passwordEl = document.getElementById('password');
        const errorMsg   = document.getElementById('errorMsg');
        const loginBtn   = document.getElementById('loginBtn');

        const email    = emailEl.value.trim();
        const password = passwordEl.value;

        // Reset previous errors
        errorMsg.classList.remove('visible');
        emailEl.classList.remove('error-field');
        passwordEl.classList.remove('error-field');

        // Validate: both fields must be filled
        let hasError = false;
        if (!email) {
            emailEl.classList.add('error-field');
            hasError = true;
        }
        if (!password) {
            passwordEl.classList.add('error-field');
            hasError = true;
        }
        if (hasError) {
            errorMsg.textContent = 'יש למלא את כל השדות.';
            errorMsg.classList.add('visible');
            return;
        }

        // Validate email format
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            emailEl.classList.add('error-field');
            errorMsg.textContent = 'כתובת המייל אינה תקינה.';
            errorMsg.classList.add('visible');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'מתחבר...';

        try {
            const hash = await sha256(password);

            if (email === VALID_EMAIL && hash === VALID_HASH) {
                sessionStorage.setItem(SESSION_KEY, JSON.stringify({ email }));
                showDashboard(email);
            } else {
                emailEl.classList.add('error-field');
                passwordEl.classList.add('error-field');
                errorMsg.textContent = 'כתובת המייל או הסיסמה שגויים. נסה שנית.';
                errorMsg.classList.add('visible');
                passwordEl.value = '';
            }
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'כניסה למערכת';
        }
    });
})();
</script>

</body>
</html>
